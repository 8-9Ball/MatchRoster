<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CPA Lineup Builder</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeede9;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9a9a96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --green-bg: #EAF3DE; --green: #3B6D11; --green-border: #639922;
    --blue-bg: #E6F1FB; --blue: #185FA5; --blue-border: #378ADD;
    --amber-bg: #FAEEDA; --amber: #854F0B; --amber-border: #BA7517;
    --red-bg: #FCEBEB; --red: #A32D2D; --red-border: #E24B4A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #f0f0ec; --text2: #9a9a96; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #172d0a; --green: #a0d060; --green-border: #3B6D11;
      --blue-bg: #0d2540; --blue: #85b7eb; --blue-border: #185FA5;
      --amber-bg: #2d1f06; --amber: #efaa50; --amber-border: #854F0B;
      --red-bg: #2d0d0d; --red: #f09595; --red-border: #A32D2D;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; color: var(--text); background: var(--bg3); min-height: 100vh; }
  #app { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .header { margin-bottom: 1.25rem; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .header p { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
  .tab { padding: 7px 14px; font-size: 13px; background: none; border: none; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; font-family: inherit; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }
  .section { padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg); margin-bottom: 0.85rem; }
  .label { font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .btn { padding: 5px 11px; font-size: 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); cursor: pointer; color: var(--text); white-space: nowrap; transition: background .12s; font-family: inherit; }
  .btn:hover { background: var(--bg3); }
  .btn.danger { border-color: var(--red-border); color: var(--red); }
  .btn.danger:hover { background: var(--red-bg); }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn.primary:hover { opacity: .85; }
  .btn.green { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .btn.green:hover { filter: brightness(0.95); }
  .btn.sm { padding: 3px 8px; font-size: 11px; }
  .avail-btn { padding: 5px 11px; font-size: 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg2); cursor: pointer; color: var(--text2); transition: all .12s; white-space: nowrap; font-family: inherit; }
  .avail-btn.sel-both { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .avail-btn.sel-eight { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
  .avail-btn.sel-nine { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber); }
  .avail-btn.sel-out { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
  .slot { display: flex; align-items: center; gap: 6px; padding: 6px 9px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 4px; background: var(--bg2); font-size: 12px; }
  .slot.empty { border-style: dashed; color: var(--text3); justify-content: center; min-height: 32px; }
  .cap-bar { height: 5px; border-radius: 3px; background: var(--border); overflow: hidden; margin: 5px 0; }
  .cap-fill { height: 100%; border-radius: 3px; transition: width .2s; }
  .cap-ok { background: var(--green-border); } .cap-warn { background: var(--amber-border); } .cap-over { background: var(--red-border); }
  .cap-label { font-size: 11px; color: var(--text2); }
  .pick-row { display: flex; align-items: center; gap: 6px; padding: 5px 7px; border-radius: var(--radius); cursor: pointer; transition: background .1s; font-size: 12px; }
  .pick-row:hover { background: var(--bg2); }
  .pick-row.in-lineup { opacity: .4; cursor: default; pointer-events: none; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 10px 13px; }
  .stat-card .sv { font-size: 22px; font-weight: 600; }
  .stat-card .sl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .two-col { display: flex; gap: 12px; flex-wrap: wrap; }
  .lineup-col { flex: 1; min-width: 200px; }
  .empty-state { text-align: center; padding: 2rem; color: var(--text2); font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge.green { background: var(--green-bg); color: var(--green); }
  .badge.blue { background: var(--blue-bg); color: var(--blue); }
  .badge.amber { background: var(--amber-bg); color: var(--amber); }
  .badge.red { background: var(--red-bg); color: var(--red); }
  .win-pill { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; min-width: 34px; text-align: center; }
  .preview-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; font-family: "SF Mono", "Fira Code", "Consolas", monospace; font-size: 12.5px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; color: var(--text); }
  .roster-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .roster-table th { text-align: left; font-size: 11px; color: var(--text2); font-weight: 500; padding: 4px 6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .roster-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .roster-table tr:last-child td { border-bottom: none; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .form-group { display: flex; flex-direction: column; gap: 3px; }
  .form-label { font-size: 11px; color: var(--text2); }
  input[type=text], input[type=number], input[type=date] { padding: 6px 9px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); width: 100%; font-family: inherit; }
  input:focus { outline: none; border-color: var(--text2); }
  .form-actions { grid-column: 1 / -1; display: flex; gap: 8px; margin-top: 4px; }
  .settings-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 13px; padding-bottom: 0.85rem; margin-bottom: 0.85rem; border-bottom: 1px solid var(--border); justify-content: space-between; }
  .settings-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="app"></div>
<textarea id="copy-ta" style="position:fixed;left:-9999px;top:0"></textarea>

<script type="text/babel">
const {useState, useEffect, useRef} = React;

const SEED = [
  {id:'p1', name:'Chris Masters',   h8:7, h9:8, w8:1,  g8:3,  w9:7, g9:11 },
  {id:'p2', name:'Mark Mazzon',     h8:6, h9:5, w8:6,  g8:10, w9:2, g9:4  }, 
  {id:'p3', name:'Brad Allen',      h8:5, h9:5, w8:5,  g8:10, w9:8, g9:11 },
  {id:'p4', name:'Dan Piitz',       h8:5, h9:4, w8:4,  g8:7,  w9:6, g9:8  },
  {id:'p5', name:'Zoran Janjanin',  h8:3, h9:3, w8:0,  g8:0,  w9:0, g9:0  },
  {id:'p6', name:'Aman Verma',      h8:2, h9:2, w8:1,  g8:12, w9:5, g9:12 },
];

const BLANK = {name:'', h8:'', h9:'', w8:'', g8:'', w9:'', g9:''};

function uid() { return Math.random().toString(36).slice(2, 8); }
function pct(w, g) { return g > 0 ? Math.round(w / g * 100) : 0; }

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function WinPill({w, g}) {
  const p = pct(w, g);
  const col = p >= 60 ? 'var(--green)' : p >= 40 ? 'var(--amber)' : 'var(--red)';
  const bg  = p >= 60 ? 'var(--green-bg)' : p >= 40 ? 'var(--amber-bg)' : 'var(--red-bg)';
  return <span className="win-pill" style={{background: bg, color: col}}>{w}/{g}</span>;
}

function BallIcon({fmt}) {
  if (fmt === '8') return (
    <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" style={{display:'inline-block',verticalAlign:'middle',marginRight:6,flexShrink:0}}>
      <circle cx="11" cy="11" r="10.5" fill="#1a1a1a" stroke="#000" strokeWidth="0.5"/>
      <circle cx="11" cy="11" r="5.5" fill="white"/>
      <text x="11" y="15" textAnchor="middle" fontSize="7" fontWeight="700" fontFamily="-apple-system,sans-serif" fill="#1a1a1a">8</text>
    </svg>
  );
  return (
    <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" style={{display:'inline-block',verticalAlign:'middle',marginRight:6,flexShrink:0}}>
      <circle cx="11" cy="11" r="10.5" fill="#f5c400" stroke="#c8960a" strokeWidth="0.5"/>
      <circle cx="11" cy="11" r="5.5" fill="white"/>
      <text x="11" y="15" textAnchor="middle" fontSize="7" fontWeight="700" fontFamily="-apple-system,sans-serif" fill="#1a1a1a">9</text>
    </svg>
  );
}

function CapBar({total, cap}) {
  const p = Math.min(100, (total / cap) * 100);
  const cls = total > cap ? 'cap-over' : total >= cap - 2 ? 'cap-warn' : 'cap-ok';
  return (
    <div>
      <div className="cap-bar"><div className={`cap-fill ${cls}`} style={{width: p + '%'}}/></div>
      <div className="cap-label">
        Total: <strong style={{color: total > cap ? 'var(--red)' : total >= cap - 2 ? 'var(--amber)' : 'inherit'}}>{total}</strong> / {cap} cap
      </div>
    </div>
  );
}

function App() {
  const [tab,      setTab]      = useState('roster');
  const [players,  setPlayers]  = useState(() => load('cpa_players', SEED));
  const [avail,    setAvail]    = useState({});
  const [lineup8,  setLineup8]  = useState([]);
  const [lineup9,  setLineup9]  = useState([]);
  const [cap,      setCap]      = useState(() => load('cpa_cap', 23));
  const [teamSize, setTeamSize] = useState(() => load('cpa_teamsize', 5));
  const [form,     setForm]     = useState(BLANK);
  const [editId,   setEditId]   = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [opponent, setOpponent] = useState(() => load('cpa_opponent', ''));
  const [matchDate,setMatchDate]= useState(() => load('cpa_date', ''));
  const [venue,    setVenue]    = useState(() => load('cpa_venue', ''));
  const [copied,   setCopied]   = useState(false);

  useEffect(() => save('cpa_players', players),  [players]);
  useEffect(() => save('cpa_cap',     cap),       [cap]);
  useEffect(() => save('cpa_teamsize',teamSize),  [teamSize]);
  useEffect(() => save('cpa_opponent',opponent),  [opponent]);
  useEffect(() => save('cpa_date',    matchDate), [matchDate]);
  useEffect(() => save('cpa_venue',   venue),     [venue]);

  function savePlayer() {
    const name = form.name.trim();
    if (!name || form.h8 === '' || form.h9 === '') return;
    const p = { id: editId || uid(), name, h8: +form.h8, h9: +form.h9, w8: +form.w8 || 0, g8: +form.g8 || 0, w9: +form.w9 || 0, g9: +form.g9 || 0 };
    if (editId) { setPlayers(ps => ps.map(x => x.id === editId ? p : x)); }
    else { setPlayers(ps => [...ps, p]); }
    setEditId(null); setForm(BLANK); setShowForm(false);
  }

  function startEdit(p) { setEditId(p.id); setForm({name:p.name, h8:p.h8, h9:p.h9, w8:p.w8, g8:p.g8, w9:p.w9, g9:p.g9}); setShowForm(true); }

  function delPlayer(id) {
    if (!window.confirm('Remove this player?')) return;
    setPlayers(ps => ps.filter(x => x.id !== id));
    setAvail(a => { const n = {...a}; delete n[id]; return n; });
    setLineup8(l => l.filter(x => x !== id));
    setLineup9(l => l.filter(x => x !== id));
  }

  function setAv(id, v) { setAvail(a => ({...a, [id]: v})); }

  function toggleLu(fmt, pid) {
    const setter = fmt === '8' ? setLineup8 : setLineup9;
    const cur    = fmt === '8' ? lineup8    : lineup9;
    if (cur.includes(pid)) { setter(l => l.filter(x => x !== pid)); }
    else if (cur.length < teamSize) { setter(l => [...l, pid]); }
  }

  function calcTotal(lu, fmt) {
    return lu.reduce((s, id) => { const p = players.find(x => x.id === id); return s + (p ? (fmt === '8' ? p.h8 : p.h9) : 0); }, 0);
  }

  function av8(p) { const v = avail[p.id]; return v === 'eight' || v === 'both'; }
  function av9(p) { const v = avail[p.id]; return v === 'nine'  || v === 'both'; }

  function fmtDate(d) {
    if (!d) return '';
    const [y, m, dd] = d.split('-');
    return `${parseInt(dd)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]} ${y}`;
  }

  function buildMsg() {
    const lines = [];
    lines.push('🎱 *CPA MATCH LINEUP*');
    if (opponent)  lines.push(`vs *${opponent}*`);
    if (matchDate) lines.push(`📅 ${fmtDate(matchDate)}`);
    if (venue)     lines.push(`📍 ${venue}`);
    lines.push('');
    const t8 = calcTotal(lineup8, '8');
    lines.push('*8-BALL LINEUP* ⚫');
    if (lineup8.length === 0) { lines.push('  — not set —'); }
    else {
      lineup8.forEach((id, i) => { const p = players.find(x => x.id === id); if (p) lines.push(`  ${i+1}. ${p.name}  (SL ${p.h8} · ${p.w8}/${p.g8} wins)`); });
      for (let i = lineup8.length; i < teamSize; i++) lines.push(`  ${i+1}. — TBD —`);
      lines.push(`  _Team total: ${t8} / ${cap}_`);
    }
    lines.push('');
    const t9 = calcTotal(lineup9, '9');
    lines.push('*9-BALL LINEUP* 🟡');
    if (lineup9.length === 0) { lines.push('  — not set —'); }
    else {
      lineup9.forEach((id, i) => { const p = players.find(x => x.id === id); if (p) lines.push(`  ${i+1}. ${p.name}  (SL ${p.h9} · ${p.w9}/${p.g9} wins)`); });
      for (let i = lineup9.length; i < teamSize; i++) lines.push(`  ${i+1}. — TBD —`);
      lines.push(`  _Team total: ${t9} / ${cap}_`);
    }
    const sitting = players.filter(p => !lineup8.includes(p.id) && !lineup9.includes(p.id) && avail[p.id] && avail[p.id] !== 'out');
    if (sitting.length > 0) { lines.push(''); lines.push(`_Sitting out: ${sitting.map(p => p.name).join(', ')}_`); }
    lines.push(''); lines.push('Good luck everyone! 🍀');
    return lines.join('\n');
  }

  function doCopy() {
    const txt = buildMsg();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }).catch(() => fbCopy(txt));
    } else { fbCopy(txt); }
  }
  function fbCopy(txt) {
    const ta = document.getElementById('copy-ta');
    ta.value = txt; ta.style.display = 'block'; ta.select();
    try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2500); } catch {}
    ta.style.display = 'none';
  }

  function clearWeek() { setAvail({}); setLineup8([]); setLineup9([]); }

  const availCount = players.filter(p => avail[p.id] && avail[p.id] !== 'out').length;
  const total8 = calcTotal(lineup8, '8');
  const total9 = calcTotal(lineup9, '9');

  return (
    <div>
      <div className="header">
        <h1>🎱 CPA Lineup Builder</h1>
        <p>Roster · availability · lineups · WhatsApp export</p>
      </div>

      <div className="stat-grid">
        <div className="stat-card"><div className="sv">{players.length}</div><div className="sl">Registered players</div></div>
        <div className="stat-card"><div className="sv">{availCount}</div><div className="sl">Available this week</div></div>
      </div>

      <div className="tabs">
        {[['roster','Roster'],['week','This Week'],['lineup','Lineup'],['share','Share']].map(([v,l]) => (
          <button key={v} className={`tab${tab===v?' active':''}`} onClick={() => setTab(v)}>{l}</button>
        ))}
      </div>

      {/* ── ROSTER ─────────────────────────────── */}
      {tab === 'roster' && (
        <div>
          <div className="section">
            <div className="settings-row">
              <div className="settings-left">
                <span style={{color:'var(--text2)'}}>Team size:</span>
                <input type="number" min="1" max="9" value={teamSize} onChange={e => setTeamSize(+e.target.value)} style={{width:50}}/>
                <span style={{color:'var(--text2)'}}>Handicap cap:</span>
                <input type="number" min="1" max="99" value={cap} onChange={e => setCap(+e.target.value)} style={{width:60}}/>
              </div>
              <button className="btn primary sm" onClick={() => { setEditId(null); setForm(BLANK); setShowForm(s => !s); }}>
                {showForm && !editId ? 'Cancel' : '+ Add player'}
              </button>
            </div>

            {players.length === 0 && <div className="empty-state">No players yet — add your first player above</div>}

            {players.length > 0 && (
              <div style={{overflowX:'auto'}}>
                <table className="roster-table">
                  <thead>
                    <tr>
                      <th>Player</th>
                      <th>8-ball SL</th><th>8-ball W/G</th><th>8-ball %</th>
                      <th>9-ball SL</th><th>9-ball W/G</th><th>9-ball %</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {players.map(p => (
                      <tr key={p.id}>
                        <td style={{fontWeight:600}}>{p.name}</td>
                        <td style={{fontWeight:600}}>{p.h8}</td>
                        <td><WinPill w={p.w8} g={p.g8}/></td>
                        <td style={{color: pct(p.w8,p.g8)>=60?'var(--green)':pct(p.w8,p.g8)>=40?'var(--amber)':'var(--red)', fontWeight:600}}>{pct(p.w8,p.g8)}%</td>
                        <td style={{fontWeight:600}}>{p.h9}</td>
                        <td><WinPill w={p.w9} g={p.g9}/></td>
                        <td style={{color: pct(p.w9,p.g9)>=60?'var(--green)':pct(p.w9,p.g9)>=40?'var(--amber)':'var(--red)', fontWeight:600}}>{pct(p.w9,p.g9)}%</td>
                        <td>
                          <div style={{display:'flex',gap:4}}>
                            <button className="btn sm" onClick={() => startEdit(p)}>Edit</button>
                            <button className="btn sm danger" onClick={() => delPlayer(p.id)}>✕</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {showForm && (
              <div className="form-grid">
                <div className="form-group" style={{gridColumn:'1/-1'}}>
                  <div className="form-label">Player name</div>
                  <input type="text" placeholder="Full name" value={form.name} onChange={e => setForm(f => ({...f, name:e.target.value}))} onKeyDown={e => e.key==='Enter' && savePlayer()}/>
                </div>
                <div style={{gridColumn:'1/-1',fontSize:11,fontWeight:600,color:'var(--text2)',marginTop:4,letterSpacing:'0.05em'}}>8-BALL</div>
                <div className="form-group">
                  <div className="form-label">Skill level (1–7)</div>
                  <input type="number" min="1" max="7" placeholder="e.g. 5" value={form.h8} onChange={e => setForm(f => ({...f, h8:e.target.value}))}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,gridColumn:'1/-1'}}>
                  <div className="form-group">
                    <div className="form-label">Matches won</div>
                    <input type="number" min="0" placeholder="0" value={form.w8} onChange={e => setForm(f => ({...f, w8:e.target.value}))}/>
                  </div>
                  <div className="form-group">
                    <div className="form-label">Matches played</div>
                    <input type="number" min="0" placeholder="0" value={form.g8} onChange={e => setForm(f => ({...f, g8:e.target.value}))}/>
                  </div>
                </div>
                <div style={{gridColumn:'1/-1',fontSize:11,fontWeight:600,color:'var(--text2)',marginTop:4,letterSpacing:'0.05em'}}>9-BALL</div>
                <div className="form-group">
                  <div className="form-label">Skill level (1–9)</div>
                  <input type="number" min="1" max="9" placeholder="e.g. 5" value={form.h9} onChange={e => setForm(f => ({...f, h9:e.target.value}))}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,gridColumn:'1/-1'}}>
                  <div className="form-group">
                    <div className="form-label">Matches won</div>
                    <input type="number" min="0" placeholder="0" value={form.w9} onChange={e => setForm(f => ({...f, w9:e.target.value}))}/>
                  </div>
                  <div className="form-group">
                    <div className="form-label">Matches played</div>
                    <input type="number" min="0" placeholder="0" value={form.g9} onChange={e => setForm(f => ({...f, g9:e.target.value}))}/>
                  </div>
                </div>
                <div className="form-actions">
                  <button className="btn primary" onClick={savePlayer}>{editId ? 'Update player' : 'Add player'}</button>
                  <button className="btn" onClick={() => { setShowForm(false); setEditId(null); setForm(BLANK); }}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── THIS WEEK ──────────────────────────── */}
      {tab === 'week' && (
        <div>
          <div className="section">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.6rem'}}>
              <div className="label">Set each player's availability</div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn sm" onClick={clearWeek}>Reset week</button>
              </div>
            </div>
            {players.length === 0 && <div className="empty-state">Add players in the Roster tab first</div>}
            {players.map(p => {
              const v = avail[p.id] || 'out';
              return (
                <div className="row" key={p.id}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
                    <div style={{fontSize:11,color:'var(--text2)',marginTop:1}}>
                      8-ball SL {p.h8} · {pct(p.w8,p.g8)}% &nbsp;|&nbsp; 9-ball SL {p.h9} · {pct(p.w9,p.g9)}%
                    </div>
                  </div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {[['both','Both','sel-both'],['eight','8-ball','sel-eight'],['nine','9-ball','sel-nine'],['out','Out','sel-out']].map(([av,lbl,cls]) => (
                      <button key={av} className={`avail-btn${v===av?' '+cls:''}`} onClick={() => setAv(p.id, av)}>{lbl}</button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="section">
            <div className="label" style={{marginBottom:8}}>Summary</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[['both','Both games','green'],['eight','8-ball only','blue'],['nine','9-ball only','amber'],['out','Not available','red']].map(([v,lbl,cls]) => {
                const count = players.filter(p => (avail[p.id]||'out') === v).length;
                return count > 0 && <span key={v} className={`badge ${cls}`}>{count} — {lbl}</span>;
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── LINEUP ─────────────────────────────── */}
      {tab === 'lineup' && (
        <div>
          <div style={{display:'flex',gap:8,marginBottom:'0.85rem',flexWrap:'wrap'}}>
            <button className="btn sm" onClick={() => { setLineup8([]); setLineup9([]); }}>Clear both</button>
            <button className="btn sm" onClick={() => setLineup8([])}>Clear 8-ball</button>
            <button className="btn sm" onClick={() => setLineup9([])}>Clear 9-ball</button>
            <button className="btn sm green" onClick={() => setTab('share')}>Share summary →</button>
          </div>
          <div className="two-col">
            {[['8','8-ball',lineup8,setLineup8,av8,total8],['9','9-ball',lineup9,setLineup9,av9,total9]].map(([fmt,lbl,lu,setLu,avFn,tot]) => (
              <div className="lineup-col" key={fmt}>
                <div className="section">
                  <div style={{fontSize:14,fontWeight:600,marginBottom:8,display:'flex',alignItems:'center'}}><BallIcon fmt={fmt}/>{lbl} Lineup</div>
                  <CapBar total={tot} cap={cap}/>
                  <div style={{marginTop:10}}>
                    {lu.map((id, i) => {
                      const p = players.find(x => x.id === id); if (!p) return null;
                      const hc = fmt==='8' ? p.h8 : p.h9;
                      const w  = fmt==='8' ? p.w8  : p.w9;
                      const g  = fmt==='8' ? p.g8  : p.g9;
                      return (
                        <div className="slot" key={id}>
                          <span style={{fontSize:10,color:'var(--text3)',minWidth:12}}>{i+1}</span>
                          <span style={{flex:1,fontWeight:600}}>{p.name}</span>
                          <span style={{fontSize:11,color:'var(--text2)'}}>SL {hc}</span>
                          <WinPill w={w} g={g}/>
                          <button className="btn sm danger" style={{padding:'2px 6px',fontSize:10}} onClick={() => toggleLu(fmt, id)}>✕</button>
                        </div>
                      );
                    })}
                    {Array.from({length: teamSize - lu.length}).map((_, i) => (
                      <div className="slot empty" key={'e'+i}>— open slot —</div>
                    ))}
                  </div>
                  <div style={{marginTop:10}}>
                    <div className="label">{lu.length < teamSize ? 'Tap to add to lineup' : 'Lineup full — remove a player to swap'}</div>
                    {players.filter(avFn).length === 0 && <div style={{fontSize:12,color:'var(--text2)',padding:'6px 0'}}>No players available for {lbl} — set availability first</div>}
                    {players.filter(avFn).map(p => {
                      const hc = fmt==='8' ? p.h8 : p.h9;
                      const w  = fmt==='8' ? p.w8  : p.w9;
                      const g  = fmt==='8' ? p.g8  : p.g9;
                      return (
                        <div className={`pick-row${lu.includes(p.id)?' in-lineup':''}`} key={p.id} onClick={() => toggleLu(fmt, p.id)}>
                          <span style={{flex:1,fontWeight:600,fontSize:12}}>{p.name}</span>
                          <span style={{fontSize:11,color:'var(--text2)',marginRight:4}}>SL {hc}</span>
                          <WinPill w={w} g={g}/>
                          {lu.includes(p.id) && <span style={{fontSize:10,color:'var(--green)',marginLeft:4}}>✓</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── SHARE ──────────────────────────────── */}
      {tab === 'share' && (
        <div>
          <div className="section">
            <div className="label" style={{marginBottom:8}}>Match details (optional)</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <div className="form-label">Opponent team name</div>
                <input type="text" placeholder="e.g. The Scratch Artists" value={opponent} onChange={e => setOpponent(e.target.value)}/>
              </div>
              <div className="form-group">
                <div className="form-label">Match date</div>
                <input type="date" value={matchDate} onChange={e => setMatchDate(e.target.value)}/>
              </div>
              <div className="form-group">
                <div className="form-label">Venue</div>
                <input type="text" placeholder="e.g. Dooly's Scarborough" value={venue} onChange={e => setVenue(e.target.value)}/>
              </div>
            </div>
          </div>

          <div className="section">
            <div className="label" style={{marginBottom:8}}>WhatsApp message preview</div>
            <div className="preview-box">{buildMsg()}</div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginTop:'0.85rem'}}>
              <button className="btn green" onClick={doCopy}>Copy to clipboard</button>
              {copied && <span style={{fontSize:12,color:'var(--green)',fontWeight:600}}>Copied — paste straight into WhatsApp ✓</span>}
            </div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:8}}>WhatsApp renders *bold* and _italic_ automatically. Paste as-is.</div>
          </div>

          <div className="section">
            <div className="label" style={{marginBottom:6}}>Lineup status</div>
            <div style={{display:'flex',gap:16,flexWrap:'wrap',fontSize:13}}>
              <span>8-ball: <strong>{lineup8.length}/{teamSize}</strong> filled · HC total <strong style={{color:total8>cap?'var(--red)':'inherit'}}>{total8}/{cap}</strong></span>
              <span>9-ball: <strong>{lineup9.length}/{teamSize}</strong> filled · HC total <strong style={{color:total9>cap?'var(--red)':'inherit'}}>{total9}/{cap}</strong></span>
            </div>
            {(lineup8.length < teamSize || lineup9.length < teamSize) && (
              <div style={{marginTop:6,fontSize:11,color:'var(--amber)'}}>Lineup incomplete — TBD slots will appear in the message.</div>
            )}
          </div>
        </div>
      )}

      <div style={{marginTop:'2rem',paddingTop:'1rem',borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text3)',textAlign:'center'}}>
        All data saved locally in this browser · Roster persists between sessions
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('app'));
</script>
</body>
</html>
